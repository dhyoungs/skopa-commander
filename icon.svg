<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="14" fill="#02070f"/>
  <rect width="128" height="128" rx="14" fill="url(#bg-grad)" opacity="0.8"/>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#00d4ff" stroke-width="2.5"/>

  <!-- Mid ring -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5" stroke-dasharray="4 3"/>

  <!-- Inner ring -->
  <circle cx="64" cy="64" r="26" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.35"/>

  <!-- Cross hairs -->
  <line x1="64" y1="6"  x2="64" y2="24"  stroke="#00d4ff" stroke-width="2.5"/>
  <line x1="64" y1="104" x2="64" y2="122" stroke="#00d4ff" stroke-width="2.5"/>
  <line x1="6"  y1="64" x2="24"  y2="64" stroke="#00d4ff" stroke-width="2.5"/>
  <line x1="104" y1="64" x2="122" y2="64" stroke="#00d4ff" stroke-width="2.5"/>

  <!-- North arrow head -->
  <polygon points="64,7 68,20 64,17 60,20" fill="#00d4ff"/>

  <!-- Diagonal tick marks -->
  <line x1="22" y1="22" x2="30" y2="30" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="106" y1="22" x2="98" y2="30" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="22" y1="106" x2="30" y2="98" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="106" y1="106" x2="98" y2="98" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>

  <!-- Sweep arc (static representation) -->
  <path d="M64,64 L64,22 A42,42 0 0,1 106,64 Z" fill="url(#sweep-grad)" opacity="0.25"/>

  <!-- Centre diamond -->
  <polygon points="64,50 74,64 64,78 54,64" fill="none" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="64,50 74,64 64,78 54,64" fill="#00d4ff" opacity="0.15"/>

  <!-- Centre pip -->
  <circle cx="64" cy="64" r="4" fill="#00d4ff"/>
  <circle cx="64" cy="64" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- Compass labels -->
  <text x="64" y="4"   text-anchor="middle" font-family="Courier New, monospace" font-size="8" font-weight="bold" fill="#00d4ff">N</text>
  <text x="64" y="127" text-anchor="middle" font-family="Courier New, monospace" font-size="8" font-weight="bold" fill="#00d4ff" opacity="0.6">S</text>
  <text x="124" y="67" text-anchor="middle" font-family="Courier New, monospace" font-size="8" font-weight="bold" fill="#00d4ff" opacity="0.6">E</text>
  <text x="4"   y="67" text-anchor="middle" font-family="Courier New, monospace" font-size="8" font-weight="bold" fill="#00d4ff" opacity="0.6">W</text>

  <!-- Tick marks on outer ring -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.4">
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(30  64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(60  64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="12"  transform="rotate(90  64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(120 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(150 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="12"  transform="rotate(180 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(210 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(240 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="12"  transform="rotate(270 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(300 64 64)"/>
    <line x1="64" y1="6"  x2="64" y2="10"  transform="rotate(330 64 64)"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#041830"/>
      <stop offset="100%" stop-color="#010810"/>
    </linearGradient>
    <linearGradient id="sweep-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
